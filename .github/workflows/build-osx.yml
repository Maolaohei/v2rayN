name: release macOS

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      target: macos

  release-zip:
    needs: build
    uses: ./.github/workflows/package-zip.yml
    with:
      target: macos
      release_tag: v${{ github.run_id }}

  dmg:
    name: package and release macOS dmg
    needs: build
    strategy:
      matrix:
        arch: [ x64, arm64 ]
    runs-on: macos-latest
    env:
      Arch: |-
        ${{
          case(
            matrix.arch == 'x64', '64',
            matrix.arch
          )
        }}
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Generate date tag
      id: tag
      run: echo "tag=v$(TZ=Asia/Shanghai date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

    - name: Restore build artifacts
      uses: actions/download-artifact@v8
      with:
        name: ${{ matrix.arch }}
        path: v2rayN-macos-${{ env.Arch }}

    - name: Setup create-dmg
      run: brew install create-dmg

    - name: Ensure script permissions
      run: chmod 755 package-osx.sh

    - name: Package dmg
      run: ./package-osx.sh macos-$Arch v2rayN-macos-$Arch ${{ steps.tag.outputs.tag }}

    - name: Sleep for race condition between matrix jobs
      run: sleep "$(od -An -N2 -tu2 /dev/urandom | awk 'NR==1{printf "%.2f", $1/5461}')"

    - name: Upload dmg to release
      uses: svenstaro/upload-release-action@v2
      with:
        file: ${{ github.workspace }}/v2rayN*.dmg
        tag: ${{ steps.tag.outputs.tag }}
        file_glob: true
        prerelease: true

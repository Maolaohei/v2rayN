name: release Windows desktop (Avalonia UI)

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      target: windows

  release-zip:
    needs: build
    uses: ./.github/workflows/package-zip.yml
    with:
      target: windows-desktop
      release_tag: v${{ github.run_id }}

name: release Windows

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      target: windows
      project: ./v2rayN/v2rayN.csproj

  release-zip:
    needs: build
    strategy:
      matrix:
        arch: [ x64, arm64 ]
    runs-on: ubuntu-latest
    env:
      Arch: |-
        ${{
          case(
            matrix.arch == 'x64', '64',
            matrix.arch
          )
        }}
      XrayArch: |-
        ${{
          case(
            matrix.arch == 'x64', 'windows-64',
            matrix.arch
          )
        }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Generate date tag
        id: tag
        run: echo "tag=v$(TZ=Asia/Shanghai date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Restore build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.arch }}
          path: v2rayN-windows-${{ env.Arch }}

      - name: Get v2rayN-core-bin (sing-box + geo files)
        run: wget -nv -O v2rayN-windows-${{ env.Arch }}.zip "https://github.com/2dust/v2rayN-core-bin/raw/refs/heads/master/v2rayN-windows-${{ env.Arch }}.zip"

      - name: Download Bray-Core xray (latest release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          XRAY_URL=$(gh api repos/Maolaohei/Bray-Core/releases/latest --jq ".assets[] | select(.name == \"Xray-${{ env.XrayArch }}.zip\") | .browser_download_url")
          wget -nv -O xray.zip "$XRAY_URL"

      - name: Replace xray with Bray-Core
        run: |
          cd v2rayN-windows-${{ env.Arch }}
          rm -rf bin/xray
          mkdir -p bin/xray
          unzip -o ../xray.zip -d bin/xray
          chmod +x bin/xray/xray.exe
          cd ..

      - name: Package zip archive
        run: 7z a -tZip v2rayN-windows-${{ env.Arch }}.zip v2rayN-windows-${{ env.Arch }} -mx1

      - name: Sleep for race condition between matrix jobs
        run: sleep "$(od -An -N2 -tu2 /dev/urandom | awk 'NR==1{printf "%.2f", $1/5461}')"

      - name: Upload zip archive to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: ${{ github.workspace }}/v2rayN*.zip
          tag: ${{ steps.tag.outputs.tag }}
          file_glob: true
          prerelease: true
          body: |
            Build ${{ github.run_number }}
            Commit: ${{ github.sha }}
